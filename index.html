<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Molecular Visualizer — 100 Molecules | Py3Dmol Mini Project</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
<script src="https://3dmol.org/build/3Dmol-min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f5f5f0;color:#111;height:100vh;display:flex;flex-direction:column}
#header{padding:12px 16px;background:#fff;border-bottom:1px solid #ddd;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
h1{font-size:16px;font-weight:600}
#search{flex:1;min-width:200px;padding:6px 12px;border:1px solid #ccc;border-radius:8px;font-size:13px;background:#f8f8f3}
#category-bar{display:flex;gap:6px;flex-wrap:wrap;padding:8px 16px;background:#f8f8f3;border-bottom:1px solid #ddd}
.cat-btn{padding:4px 12px;border:1px solid #ccc;border-radius:20px;font-size:12px;cursor:pointer;background:#fff;transition:all 0.15s}
.cat-btn.active,.cat-btn:hover{background:#7F77DD;color:#fff;border-color:#7F77DD}
#main{display:flex;flex:1;overflow:hidden}
#mol-list{width:240px;overflow-y:auto;border-right:1px solid #ddd;background:#fff}
.mol-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #eee;transition:background 0.1s}
.mol-item:hover,.mol-item.selected{background:#EEEDFE}
.mol-item .mol-name{font-size:13px;font-weight:600}
.mol-item .mol-formula{font-size:11px;color:#666;margin-top:2px}
.mol-item .mol-tag{font-size:10px;padding:2px 7px;border-radius:10px;display:inline-block;margin-top:3px;font-weight:600}
#viewer-panel{flex:1;display:flex;flex-direction:column;overflow:hidden}
#viewer-container{flex:1;position:relative;background:#000}
#viewer{width:100%;height:100%}
#controls{display:flex;gap:8px;padding:8px 12px;background:#f8f8f3;border-top:1px solid #ddd;flex-wrap:wrap;align-items:center}
.ctrl-btn{padding:5px 12px;border:1px solid #ccc;border-radius:6px;font-size:12px;cursor:pointer;background:#fff;transition:all 0.15s}
.ctrl-btn:hover{background:#EEEDFE;border-color:#7F77DD}
.ctrl-btn.active{background:#7F77DD;color:#fff;border-color:#7F77DD}
#info-panel{width:280px;overflow-y:auto;background:#fff;border-left:1px solid #ddd;padding:14px;font-size:13px}
#info-panel h2{font-size:15px;font-weight:600;margin-bottom:10px}
.info-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #eee}
.info-label{color:#666;font-size:12px}
.info-val{font-weight:600;font-size:12px;text-align:right;max-width:150px;word-break:break-all}
.prop-section{margin-top:12px}
.prop-section h3{font-size:12px;font-weight:600;color:#534AB7;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;margin:2px;font-weight:600}
#mol-count{font-size:12px;color:#666;padding:4px 14px;background:#f8f8f3;border-bottom:1px solid #ddd}
#loading-overlay{position:absolute;inset:0;background:#111;display:flex;align-items:center;justify-content:center;color:#fff;font-size:14px;z-index:10;flex-direction:column;gap:8px}
#spinner{width:32px;height:32px;border:3px solid #444;border-top-color:#7F77DD;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#error-msg{color:#E24B4A;font-size:12px;margin-top:6px;display:none}
.smiles-code{font-family:monospace;font-size:10px;background:#f8f8f3;padding:4px 6px;border-radius:4px;word-break:break-all;margin-top:4px;color:#666}
</style>
</head>
<body>
<div id="header">
  <h1>🔬 3D Molecular Visualizer — 100 Molecules | Py3Dmol Mini Project</h1>
  <input id="search" type="text" placeholder="Search molecules by name, formula, tag..." oninput="filterMols()"/>
  <span id="total-count" style="font-size:12px;color:#666"></span>
</div>
<div id="category-bar"></div>
<div id="main">
  <div style="display:flex;flex-direction:column;width:240px;border-right:1px solid #ddd">
    <div id="mol-count"></div>
    <div id="mol-list"></div>
  </div>
  <div id="viewer-panel">
    <div id="viewer-container">
      <div id="viewer"></div>
      <div id="loading-overlay">
        <div id="spinner"></div>
        <span id="loading-text">Initializing 3D viewer...</span>
        <span id="error-msg"></span>
      </div>
    </div>
    <div id="controls">
      <span style="font-size:12px;color:#666;font-weight:600">Style:</span>
      <button class="ctrl-btn active" onclick="setStyle('stick')" id="btn-stick">Stick</button>
      <button class="ctrl-btn" onclick="setStyle('sphere')" id="btn-sphere">Sphere</button>
      <button class="ctrl-btn" onclick="setStyle('cartoon')" id="btn-cartoon">Cartoon</button>
      <button class="ctrl-btn" onclick="setStyle('line')" id="btn-line">Line</button>
      <button class="ctrl-btn" onclick="setStyle('cross')" id="btn-cross">Cross</button>
      <span style="font-size:12px;color:#666;font-weight:600;margin-left:6px">Background:</span>
      <button class="ctrl-btn active" onclick="setBG('black')" id="btn-bg-black">Dark</button>
      <button class="ctrl-btn" onclick="setBG('white')" id="btn-bg-white">Light</button>
      <button class="ctrl-btn" onclick="setBG('grey')" id="btn-bg-grey">Grey</button>
      <button class="ctrl-btn" onclick="toggleSpin()" id="btn-spin" style="margin-left:auto">⟳ Auto Spin</button>
    </div>
  </div>
  <div id="info-panel">
    <h2 id="mol-title">Select a molecule</h2>
    <div id="mol-info"><p style="color:#999;font-size:12px;margin-top:8px">Click any molecule from the list to view its 3D structure and properties.</p></div>
  </div>
</div>

let viewer = null, currentMol = 0, currentStyle = 'stick', spinning = false, spinInterval = null;
let currentCat = 'All', filteredMols = [...MOLECULES];

function getTagStyle(tag) {
  if(tag.includes('Chiral')) return 'background:#EEEDFE;color:#534AB7';
  if(tag.includes('Ring')) return 'background:#E1F5EE;color:#0F6E56';
  if(tag.includes('Drug')) return 'background:#FAECE7;color:#993C1D';
  if(tag.includes('DNA')||tag.includes('RNA')) return 'background:#E6F1FB;color:#185FA5';
  return 'background:#F1EFE8;color:#5F5E5A';
}

function getCats() {
  return ['All',...new Set(MOLECULES.map(m=>m.cat))];
}

function renderCats() {
  document.getElementById('category-bar').innerHTML = getCats().map(c=>
    `<button class="cat-btn${c===currentCat?' active':''}" onclick="selectCat('${c}')">${c}</button>`
  ).join('');
}

function selectCat(cat) {
  currentCat = cat;
  renderCats();
  filterMols();
}

function filterMols() {
  const q = document.getElementById('search').value.toLowerCase();
  filteredMols = MOLECULES.filter(m=>{
    const matchCat = currentCat==='All' || m.cat===currentCat;
    const matchQ = !q || m.name.toLowerCase().includes(q) || m.formula.toLowerCase().includes(q) || m.tags.some(t=>t.toLowerCase().includes(q)) || (m.iupac&&m.iupac.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
  renderList();
}

function renderList() {
  const list = document.getElementById('mol-list');
  document.getElementById('mol-count').textContent = `Showing ${filteredMols.length} of ${MOLECULES.length} molecules`;
  list.innerHTML = filteredMols.map(m=>{
    const idx = MOLECULES.indexOf(m);
    return `<div class="mol-item${idx===currentMol?' selected':''}" onclick="selectMol(${idx})">
      <div class="mol-name">${m.name}</div>
      <div class="mol-formula">${m.formula}</div>
      <span class="mol-tag" style="background:${m.color};color:#333">${m.cat}</span>
    </div>`;
  }).join('');
}

function initViewer() {
  document.getElementById('loading-text').textContent = 'Initializing 3Dmol.js viewer...';
  try {
    viewer = $3Dmol.createViewer(document.getElementById('viewer'),{backgroundColor:'black'});
    document.getElementById('loading-overlay').style.display='none';
    loadMolecule(0);
  } catch(e) {
    document.getElementById('loading-text').textContent = 'Error: ' + e.message;
    document.getElementById('error-msg').style.display='block';
    console.error('3Dmol error:',e);
  }
}

function loadMolecule(idx) {
  if(!viewer) return; // Fix for null reading 'clear'
  currentMol = idx;
  const mol = MOLECULES[idx];
  document.getElementById('loading-overlay').style.display='flex';
  document.getElementById('loading-text').textContent = `Loading ${mol.name}...`;
  document.getElementById('error-msg').style.display='none';

  const url = `https://cactus.nci.nih.gov/chemical/structure/${encodeURIComponent(mol.smiles)}/sdf?get3d=true`;
  fetch(url)
    .then(r=>{ if(!r.ok) throw new Error('NCI fetch failed'); return r.text(); })
    .then(sdf=>renderSDF(sdf, mol))
    .catch(()=>{
      fetch(`https://pubchem.ncbi.nlm.nih.gov/rest/pug/compound/smiles/${encodeURIComponent(mol.smiles)}/SDF?record_type=3d`)
        .then(r=>{ if(!r.ok) throw new Error('PubChem failed'); return r.text(); })
        .then(sdf=>renderSDF(sdf, mol))
        .catch(()=>renderSMILES(mol));
    });
}

function renderSDF(sdf, mol) {
  if(!viewer) return;
  viewer.clear();
  viewer.addModel(sdf,'sdf');
  applyStyle(currentStyle);
  viewer.zoomTo();
  viewer.render();
  document.getElementById('loading-overlay').style.display='none';
  showInfo(mol);
  renderList();
}

function renderSMILES(mol) {
  if(!viewer) return;
  document.getElementById('loading-text').textContent = `Using SMILES for ${mol.name}...`;
  try {
    viewer.clear();
    viewer.addModel(mol.smiles,'smi');
    applyStyle(currentStyle);
    viewer.zoomTo();
    viewer.render();
    document.getElementById('loading-overlay').style.display='none';
    showInfo(mol);
    renderList();
  } catch(e) {
    document.getElementById('loading-text').textContent = 'Render failed — try another molecule';
    document.getElementById('error-msg').textContent = e.message;
    document.getElementById('error-msg').style.display='block';
  }
}

function applyStyle(style) {
  if(!viewer) return;
  viewer.setStyle({});
  if(style==='stick') viewer.setStyle({},{stick:{radius:0.15},sphere:{scale:0.3}});
  else if(style==='sphere') viewer.setStyle({},{sphere:{scale:0.5}});
  else if(style==='cartoon') viewer.setStyle({},{cartoon:{color:'spectrum'}});
  else if(style==='line') viewer.setStyle({},{line:{linewidth:2}});
  else if(style==='cross') viewer.setStyle({},{cross:{linewidth:4,radius:0.2}});
  viewer.render();
}

function setStyle(style) {
  currentStyle = style;
  document.querySelectorAll('.ctrl-btn').forEach(b=>{
    if(!b.id.startsWith('btn-bg') && b.id!=='btn-spin') b.classList.remove('active');
  });
  const el = document.getElementById('btn-'+style);
  if(el) el.classList.add('active');
  applyStyle(style);
}

function setBG(color) {
  if(!viewer) return;
  viewer.setBackgroundColor(color);
  viewer.render();
  ['black','white','grey'].forEach(c=>{
    document.getElementById('btn-bg-'+c).classList.toggle('active', c===color);
  });
}

function toggleSpin() {
  spinning = !spinning;
  document.getElementById('btn-spin').classList.toggle('active', spinning);
  if(spinning) {
    spinInterval = setInterval(()=>{ if(viewer){viewer.rotate(1,'y');viewer.render();} },30);
  } else {
    clearInterval(spinInterval);
  }
}

function selectMol(idx) {
  currentMol = idx;
  loadMolecule(idx);
}

function showInfo(mol) {
  document.getElementById('mol-title').textContent = mol.name;
  const chirNote = mol.chirals > 0
    ? `<div class="info-row"><span class="info-label">Chiral Centers (⬟)</span><span class="info-val" style="color:#534AB7">${mol.chirals}</span></div>`
    : '';
  document.getElementById('mol-info').innerHTML = `
    <div class="prop-section"><h3>Identity</h3>
      <div class="info-row"><span class="info-label">Molecular Formula</span><span class="info-val">${mol.formula}</span></div>
      <div class="info-row"><span class="info-label">Category</span><span class="info-val">${mol.cat}</span></div>
      <div class="info-row"><span class="info-label">IUPAC Name</span><span class="info-val" style="font-size:10px">${mol.iupac}</span></div>
      <div class="info-row"><span class="info-label">Description</span><span class="info-val">${mol.desc}</span></div>
    </div>
    <div class="prop-section"><h3>Physical Properties</h3>
      <div class="info-row"><span class="info-label">Molecular Weight</span><span class="info-val">${mol.mw} g/mol</span></div>
      <div class="info-row"><span class="info-label">Boiling Point</span><span class="info-val">${mol.bp}</span></div>
      <div class="info-row"><span class="info-label">Melting Point</span><span class="info-val">${mol.mp}</span></div>
      <div class="info-row"><span class="info-label">Density</span><span class="info-val">${mol.density}</span></div>
    </div>
    <div class="prop-section"><h3>Structural Properties</h3>
      ${chirNote}
      <div class="info-row"><span class="info-label">Ring Count</span><span class="info-val">${mol.rings}</span></div>
      <div class="info-row"><span class="info-label">H-Bond Donors</span><span class="info-val">${mol.hbond_d}</span></div>
      <div class="info-row"><span class="info-label">H-Bond Acceptors</span><span class="info-val">${mol.hbond_a}</span></div>
    </div>
    <div class="prop-section"><h3>SMILES Notation</h3>
      <div class="smiles-code">${mol.smiles}</div>
    </div>
    <div class="prop-section"><h3>Tags</h3>
      <div>${mol.tags.map(t=>`<span class="badge" style="${getTagStyle(t)}">${t}</span>`).join('')}</div>
    </div>`;
}

window.addEventListener('load',()=>{
  document.getElementById('total-count').textContent = `${MOLECULES.length} total molecules`;
  renderCats();
  renderList();
  setTimeout(initViewer, 300);
});
</script>
</body>
</html>
